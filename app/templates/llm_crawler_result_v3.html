{% extends "base.html" %}
{% block title %}LLM Crawler Simulation v3{% endblock %}
{% block content %}
<div class="max-w-6xl mx-auto py-6 space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <a href="/" class="text-blue-500 hover:text-blue-700 text-sm"><i class="fas fa-arrow-left mr-1"></i>Назад</a>
      <h2 class="text-3xl font-bold text-slate-900">LLM Crawler Simulation v3</h2>
      <p class="text-sm text-slate-500">Job ID: <span class="font-mono">{{ job_id }}</span></p>
    </div>
    <div class="flex gap-2">
      <button id="v3-export-json" class="px-3 py-2 bg-slate-700 text-white rounded-lg text-sm hover:bg-slate-800"><i class="fas fa-download mr-1"></i>JSON</button>
      <button id="v3-export-docx" class="px-3 py-2 bg-slate-600 text-white rounded-lg text-sm hover:bg-slate-700"><i class="fas fa-file-word mr-1"></i>DOCX</button>
    </div>
  </div>

  <div id="v3-hero"></div>
  <div id="v3-what-ai"></div>
  <div id="v3-loss"></div>
  <div id="v3-citation"></div>
  <div id="v3-trust"></div>
  <div id="v3-reasons"></div>
  <div id="v3-fix"></div>
  <div id="v3-preview"></div>
  <div id="v3-discover"></div>
  <div id="v3-domdiff"></div>
  <div id="v3-schema"></div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  window.llmJobId = "{{ job_id }}";
</script>
<script src="/static/js/llm-crawler-v3.js?v={{ app_version }}"></script>
{% endblock %}
